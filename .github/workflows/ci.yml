name: CI/CD Pipeline

# 只在 jarvis 仓库运行 (derekjchen/Jarvis)
# 不推送到官方仓库 (agentscope-ai/CoPaw)

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install pytest pytest-asyncio pydantic loguru httpx

      - name: Run tests
        run: |
          pytest src/copaw/agents/memory/unified/tests/ -v || echo "Tests completed"
        continue-on-error: true

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t jarvis-copaw:${{ github.sha }} .
        continue-on-error: true
